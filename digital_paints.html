<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Paint Gallery - Itbaan Safwan</title>
    <style>
        /* Academic, minimalist styling */
        body {
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            line-height: 1.6;
            color: #333;
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #FAFAFA;
        }

        /* Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .site-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #111;
            text-decoration: none;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #0056b3;
            font-size: 1.1em;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Gallery Content */
        h1 {
            color: #111;
            margin-bottom: 30px;
        }

        .gallery-desc {
            margin-bottom: 40px;
            font-style: italic;
            color: #555;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .image-title {
            margin-top: 10px;
            font-weight: bold;
            color: #444;
            text-align: center;
        }

        /* Footer Links */
        footer {
            border-top: 2px solid #eaeaea;
            padding-top: 30px;
            text-align: center;
            margin-top: 60px;
        }

        .footer-links a {
            margin: 0 15px;
            color: #333;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            color: #0056b3;
            text-decoration: underline;
        }

        /* Responsive design for mobile */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            nav a {
                margin: 0 10px;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="site-title">Itbaan Safwan</a>
        <nav>
            <a href="index.html#about">About</a>
            <a href="index.html#projects">Projects</a>
            <a href="index.html#blogs">Blogs</a>
            <a href="index.html#other">Other</a>
        </nav>
    </header>

    <main>
        <h1>Digital Paint Gallery</h1>
        <p class="gallery-desc">These are some digital paints that I made during my gap years and when my mind wandered.
        </p>

        <div class="gallery">
            <div class="gallery-item">
                <a href="digital_paint_gallery/apple_farm.JPG" target="_blank">
                    <img src="digital_paint_gallery/apple_farm.JPG" alt="Apple Farm">
                </a>
                <div class="image-title">Apple Farm</div>
            </div>
            <div class="gallery-item">
                <a href="digital_paint_gallery/coffee_n_cookies.JPG" target="_blank">
                    <img src="digital_paint_gallery/coffee_n_cookies.JPG" alt="Coffee N Cookies">
                </a>
                <div class="image-title">Coffee N Cookies</div>
            </div>
            <div class="gallery-item">
                <a href="digital_paint_gallery/living_in_madness.JPG" target="_blank">
                    <img src="digital_paint_gallery/living_in_madness.JPG" alt="Living in Madness">
                </a>
                <div class="image-title">Living in Madness</div>
            </div>
            <div class="gallery-item">
                <a href="digital_paint_gallery/my_majesty.jpg" target="_blank">
                    <img src="digital_paint_gallery/my_majesty.jpg" alt="Your Majesty">
                </a>
                <div class="image-title">Your Majesty</div>
            </div>
            <div class="gallery-item">
                <a href="digital_paint_gallery/piano_time.JPG" target="_blank">
                    <img src="digital_paint_gallery/piano_time.JPG" alt="Piano Time">
                </a>
                <div class="image-title">Piano Time</div>
            </div>
            <div class="gallery-item">

            <div class="gallery-item">
                <a href="digital_paint_gallery/wonderer.JPG" target="_blank">

    </main>

        </div>
        <p style="margin-top: 20px; font-size: 0.8em; color: #999;">
            &copy; 2026 Itbaan Safwan.
        </p>
    </footer>

</body>

</html>
